<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Scientific tools store" />
    <title>Pen Store - Sign In</title>
    <link rel="stylesheet" href="Pen_CSS/master.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
        rel="stylesheet">
    <link href='https://css.gg/c' rel='stylesheet'>
</head>

<body>
    <div class="sign_in">
        <form id="signIn" action="index.html">
            <div class="data">
                <h1>sign in to your account</h1>
                <div class="user-data">
                    <input id="un" type="text" name="un" required />
                    <label for="un">username</label>
                </div>
                <div class="pass-data">
                    <input type="checkbox" id="eye-toggle" class="eye-checkbox">
                    <input id="pass" type="text" class="sec-pass" name="pass" required minlength="8" maxlength="16" />
                    <label for="pass">password</label>
                    <label for="eye-toggle" class="eye-btn">
                        <i class="bi bi-eye open-eye"></i>
                        <i class="bi bi-eye-slash closed-eye"></i>
                    </label>
                </div>
                <div class="signIn-icon">
                    <input type="submit" value="Sign In" />
                    <i class="bi bi-lightning-charge"></i>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
