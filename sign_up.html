<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" /> <!--content Encoding-->
    <meta name="description" content="Scientif tools store" />
    <title>Pen Store</title>
    <link rel="stylesheet" href="Pen_CSS/master.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap"
        rel="stylesheet">
    <link href='https://css.gg/c' rel='stylesheet'>
</head>

<body>
    <div class="sign_up">
        <form id="signUp" action="index.html">
            <div class="Updata">
                <div class="user-data">
                    <input id="un" type="text" name="un" required />
                    <label for="un">username</label>
                </div>
                <div class="mail-data">
                    <input id="mail" type="email" name="mail" required />
                    <label for="mail">email</label>
                </div>
                <div class="country">
                    <select name="country">
                        <option selected disabled hidden>Country</option>
                        <optgroup label="Africa">
                            <option>Egypt</option>
                            <option>Morocco</option>
                            <option>Tunisia</option>
                        </optgroup>
                        <optgroup label="Europe">
                            <option>France</option>
                            <option>Germany</option>
                            <option>Italy</option>
                        </optgroup>
                        <optgroup label="America">
                            <option>USA</option>
                            <option>Canada</option>
                            <option>Mexico</option>
                        </optgroup>
                    </select>
                </div>
                <div class="pass-data">
                    <input id="pass" type="password" name="pass" required minlength="8" maxlength="16" />
                    <label for="pass">password</label>
                </div>
            </div>
            <div class="signUp-icon">
                <input type="submit" value="Sign Up" />
                <i class="bi bi-person-plus-fill"></i>
            </div>
        </form>
    </div>
</body>
